<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅行規劃助手 ✈️</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    /* ─── CSS Variables ─────────────────────────────── */
    :root {
      --primary:      #7c6fef;
      --primary-dark: #6055d4;
      --secondary:    #00cec9;
      --accent:       #fd79a8;
      --warning:      #fdcb6e;
      --success:      #00b894;
      --danger:       #e17055;

      --bg1: #0d0b20;
      --bg2: #1a1535;
      --bg3: #221e42;

      --glass:        rgba(255,255,255,0.06);
      --glass-border: rgba(255,255,255,0.10);
      --text:         #f0eeff;
      --text-dim:     rgba(240,238,255,0.55);

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;
    }

    /* ─── Reset & Base ──────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC',
                   'Microsoft JhengHei', Roboto, sans-serif;
      background: linear-gradient(145deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
      color: var(--text);
      overflow: hidden;
    }

    /* ─── Header ────────────────────────────────────── */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      background: rgba(13,11,32,0.85);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--glass-border);
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.05rem; font-weight: 700;
      letter-spacing: 0.3px;
    }
    .logo-icon { font-size: 1.4rem; }

    .header-right { display: flex; gap: 8px; align-items: center; }

    /* ─── Buttons ───────────────────────────────────── */
    .btn {
      padding: 7px 14px;
      border: none; border-radius: var(--radius-sm);
      font-size: 0.82rem; font-weight: 500;
      cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
      transition: all 0.18s; white-space: nowrap;
    }
    .btn-ghost {
      background: var(--glass); color: var(--text);
      border: 1px solid var(--glass-border);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.12); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #009d7d; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.38; cursor: not-allowed; transform: none !important; }

    /* ─── Layout ────────────────────────────────────── */
    .app {
      display: flex;
      height: 100vh;
      padding-top: 60px;
    }

    /* ─── Chat Panel ────────────────────────────────── */
    .chat-panel {
      width: 400px; min-width: 340px;
      display: flex; flex-direction: column;
      border-right: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.18);
      position: relative;
    }

    .chat-topbar {
      padding: 12px 18px;
      border-bottom: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.02);
    }
    .chat-topbar-title {
      font-size: 0.78rem; font-weight: 600;
      color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px;
    }
    .agent-online {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.78rem; color: var(--success); margin-top: 3px;
    }
    .online-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--success);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* Messages */
    .messages {
      flex: 1; overflow-y: auto;
      padding: 16px 16px 0;
      display: flex; flex-direction: column; gap: 14px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .msg {
      display: flex; gap: 9px;
      animation: msgIn 0.25s ease both;
    }
    @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; flex-shrink: 0; margin-top: 2px;
    }
    .avatar-agent { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
    .avatar-user  { background: linear-gradient(135deg, var(--accent), #c44fe8); }

    .msg-body { max-width: 78%; }
    .msg-bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.875rem; line-height: 1.65;
      word-break: break-word;
    }
    .msg.agent .msg-bubble {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-bottom-left-radius: 4px;
    }
    .msg.user .msg-bubble {
      background: var(--primary);
      border-bottom-right-radius: 4px;
    }
    .msg-time {
      font-size: 0.68rem; color: var(--text-dim);
      margin-top: 4px; padding: 0 4px;
    }
    .msg.user .msg-time { text-align: right; }

    /* Typing indicator */
    .typing {
      display: flex; gap: 9px; align-items: flex-end;
      padding: 4px 16px 8px;
      opacity: 0; transition: opacity 0.25s; pointer-events: none;
    }
    .typing.show { opacity: 1; }
    .typing-dots {
      display: flex; gap: 4px;
      padding: 10px 14px;
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 14px; border-bottom-left-radius: 4px;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-dim);
      animation: bounce 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce { 0%,60%,100%{transform:none} 30%{transform:translateY(-7px)} }

    /* Input area */
    .input-zone {
      padding: 12px 14px 14px;
      border-top: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.12);
    }

    .quick-chips {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
    }
    .chip {
      padding: 4px 11px;
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      background: transparent; color: var(--text-dim);
      font-size: 0.75rem; cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover {
      border-color: var(--primary);
      color: var(--text);
      background: rgba(124,111,239,0.18);
    }

    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .msg-input {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      color: var(--text); font-size: 0.875rem;
      font-family: inherit;
      resize: none; min-height: 44px; max-height: 110px;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    .msg-input::placeholder { color: rgba(255,255,255,0.28); }
    .msg-input:focus { outline: none; border-color: var(--primary); }

    .send-btn {
      width: 44px; height: 44px; border-radius: var(--radius-md);
      border: none; background: var(--primary); color: #fff;
      font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s;
    }
    .send-btn:hover { background: var(--primary-dark); transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.38; cursor: not-allowed; transform: none; }

    /* ─── Itinerary Panel ───────────────────────────── */
    .itinerary-panel {
      flex: 1; overflow-y: auto;
      padding: 22px;
      display: flex; flex-direction: column;
    }
    .itinerary-panel::-webkit-scrollbar { width: 5px; }
    .itinerary-panel::-webkit-scrollbar-track { background: transparent; }
    .itinerary-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    /* Empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; text-align: center; color: var(--text-dim);
    }
    .empty-icon {
      font-size: 3.8rem; opacity: 0.45;
      animation: float 3.5s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
    .empty-state h2 { font-size: 1.2rem; color: var(--text); opacity: 0.6; }
    .empty-state p { font-size: 0.85rem; max-width: 280px; line-height: 1.7; }

    /* Itinerary cards */
    .itin-content { display: flex; flex-direction: column; gap: 18px; }

    /* Hero */
    .itin-hero {
      background: linear-gradient(135deg, rgba(124,111,239,0.35), rgba(0,206,201,0.25));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 26px; text-align: center;
    }
    .itin-hero-label {
      font-size: 0.72rem; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--text-dim); margin-bottom: 8px;
    }
    .itin-hero-title { font-size: 1.75rem; font-weight: 700; margin-bottom: 10px; }
    .itin-meta {
      display: flex; justify-content: center; flex-wrap: wrap; gap: 16px;
      font-size: 0.82rem; color: var(--text-dim);
    }
    .itin-meta-item { display: flex; align-items: center; gap: 5px; }

    /* Day card */
    .day-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .day-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px;
      background: rgba(124,111,239,0.18);
      border-bottom: 1px solid var(--glass-border);
    }
    .day-badge {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
    }
    .day-header-info h4 { font-size: 0.95rem; font-weight: 600; }
    .day-header-info p  { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }

    .activities { padding: 14px 16px; display: flex; flex-direction: column; }

    .act-row { display: flex; gap: 10px; }

    /* Timeline spine */
    .act-spine {
      display: flex; flex-direction: column; align-items: center;
      flex-shrink: 0; width: 46px;
    }
    .act-time {
      font-size: 0.68rem; color: var(--text-dim);
      white-space: nowrap; line-height: 1;
      text-align: center; padding-top: 2px;
    }
    .act-dot {
      width: 10px; height: 10px; border-radius: 50%;
      border: 2px solid;
      background: var(--bg1);
      margin: 4px auto;
      flex-shrink: 0;
    }
    .act-dot.attraction { border-color: var(--primary); }
    .act-dot.restaurant { border-color: var(--warning); }
    .act-dot.hotel      { border-color: var(--secondary); }
    .act-dot.transport  { border-color: rgba(255,255,255,0.3); }
    .act-dot.shopping   { border-color: var(--accent); }

    .act-line {
      width: 2px; flex: 1; min-height: 12px;
      background: var(--glass-border);
      margin: 0 auto;
    }

    .act-card {
      flex: 1; margin-bottom: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 10px 13px;
      transition: background 0.18s;
    }
    .act-card:hover { background: rgba(255,255,255,0.07); }

    .act-card-top {
      display: flex; align-items: center; gap: 7px; margin-bottom: 4px;
    }
    .act-icon { font-size: 0.95rem; flex-shrink: 0; }
    .act-name { font-weight: 600; font-size: 0.88rem; flex: 1; }
    .act-dur  {
      font-size: 0.7rem; color: var(--text-dim);
      background: rgba(255,255,255,0.07);
      padding: 2px 7px; border-radius: 10px;
      white-space: nowrap;
    }
    .act-desc {
      font-size: 0.8rem; color: var(--text-dim);
      line-height: 1.55; margin-bottom: 5px;
    }
    .act-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: 0.72rem; color: var(--text-dim);
      display: flex; align-items: center; gap: 3px;
    }
    .transport-tag {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.7rem; color: var(--text-dim);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      padding: 2px 8px; border-radius: 10px;
      margin-top: 5px;
    }
    .tip-text { font-size: 0.72rem; color: var(--warning); margin-top: 4px; }

    /* Section */
    .section { display: flex; flex-direction: column; gap: 12px; }
    .section-heading {
      font-size: 0.9rem; font-weight: 600;
      display: flex; align-items: center; gap: 7px;
    }

    /* Hotel cards */
    .hotel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .hotel-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 14px;
    }
    .hotel-name   { font-weight: 600; margin-bottom: 3px; }
    .hotel-type   { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 6px; }
    .hotel-stars  { color: var(--warning); font-size: 0.82rem; margin-bottom: 6px; }
    .hotel-price  { font-size: 0.88rem; color: var(--secondary); font-weight: 600; }
    .hotel-loc    { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; }
    .hotel-note   { font-size: 0.73rem; color: var(--text-dim); margin-top: 5px; line-height: 1.4; }

    /* Budget */
    .budget-wrap {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 18px;
    }
    .budget-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px; margin-bottom: 14px;
    }
    .budget-item {
      background: rgba(255,255,255,0.04);
      border-radius: var(--radius-sm);
      padding: 11px; text-align: center;
    }
    .budget-item-icon  { font-size: 1.2rem; margin-bottom: 5px; }
    .budget-item-label { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 3px; }
    .budget-item-val   { font-size: 0.87rem; font-weight: 600; color: var(--secondary); }
    .budget-total {
      text-align: center;
      padding-top: 14px;
      border-top: 1px solid var(--glass-border);
    }
    .budget-total-label { font-size: 0.82rem; color: var(--text-dim); }
    .budget-total-val   { font-size: 1.4rem; font-weight: 700; color: var(--primary); }

    /* Tips */
    .tips-box {
      background: rgba(253,121,168,0.09);
      border: 1px solid rgba(253,121,168,0.25);
      border-radius: var(--radius-lg);
      padding: 18px;
    }
    .tips-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .tips-list li {
      display: flex; gap: 8px;
      font-size: 0.82rem; line-height: 1.6;
    }
    .tips-list li::before { content: '💡'; flex-shrink: 0; }

    /* ─── Modals ────────────────────────────────────── */
    .overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(5px);
      align-items: center; justify-content: center;
    }
    .overlay.show { display: flex; }

    .modal {
      background: #16132e;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 28px;
      width: 460px; max-width: 92vw;
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn { from{opacity:0;transform:scale(0.95) translateY(-12px)} to{opacity:1;transform:none} }

    .modal h2 { font-size: 1.15rem; margin-bottom: 18px; }

    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 0.82rem; color: var(--text-dim); margin-bottom: 5px; }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 9px 13px; color: var(--text);
      font-size: 0.87rem; font-family: inherit;
    }
    .form-input:focus { outline: none; border-color: var(--primary); }
    .form-hint { font-size: 0.72rem; color: rgba(255,255,255,0.35); margin-top: 5px; line-height: 1.5; }
    .form-hint a { color: var(--primary); }

    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px; }

    /* ─── Toast ─────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 22px; right: 22px; z-index: 999;
      background: #1c183a;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 10px 18px;
      display: flex; align-items: center; gap: 9px;
      font-size: 0.83rem;
      box-shadow: 0 8px 28px rgba(0,0,0,0.45);
      animation: msgIn 0.25s ease both;
    }
    .spinner {
      width: 15px; height: 15px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.18);
      border-top-color: var(--primary);
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ─── Export view (off-screen, for PDF) ─────────── */
    #export-view {
      position: fixed; left: -9999px; top: 0;
      width: 820px;
      background: #fff; color: #222;
      font-family: 'PingFang TC', 'Microsoft JhengHei', Arial, sans-serif;
      padding: 40px;
      font-size: 13px;
      line-height: 1.6;
    }

    /* ─── Responsive ────────────────────────────────── */
    @media (max-width: 720px) {
      .chat-panel { width: 100%; min-width: 0; }
      .app { flex-direction: column; overflow-y: auto; height: auto; }
      body { overflow: auto; }
      .itinerary-panel { min-height: 60vh; }
    }
  </style>
</head>
<body>

<!-- ═══════════════ Header ═══════════════ -->
<header class="header">
  <div class="logo">
    <span class="logo-icon">✈️</span>
    <span>旅行規劃助手</span>
  </div>
  <div class="header-right">
    <button class="btn btn-ghost" onclick="openSettings()">⚙️ API 設定</button>
    <button class="btn btn-ghost" id="btn-pdf"  onclick="exportPDF()"  disabled>📄 PDF</button>
    <button class="btn btn-success" id="btn-word" onclick="exportWord()" disabled>📝 Word</button>
    <button class="btn btn-ghost" onclick="resetChat()" title="重新開始">🔄</button>
  </div>
</header>

<!-- ═══════════════ App ═══════════════ -->
<div class="app">

  <!-- Chat Panel -->
  <div class="chat-panel">
    <div class="chat-topbar">
      <div class="chat-topbar-title">旅行顧問</div>
      <div class="agent-online"><div class="online-dot"></div>旅途精靈 · 在線</div>
    </div>

    <div class="messages" id="messages"><!-- messages injected --></div>

    <div class="typing" id="typing">
      <div class="msg-avatar avatar-agent">✈</div>
      <div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>

    <div class="input-zone">
      <div class="quick-chips" id="chips">
        <button class="chip" onclick="quickSend('我想去日本旅遊')">🗾 日本</button>
        <button class="chip" onclick="quickSend('我想去歐洲旅遊')">🏰 歐洲</button>
        <button class="chip" onclick="quickSend('我想去泰國旅遊')">🌺 泰國</button>
        <button class="chip" onclick="quickSend('我想去韓國旅遊')">🇰🇷 韓國</button>
        <button class="chip" onclick="quickSend('我想去東南亞旅遊')">🌴 東南亞</button>
      </div>
      <div class="input-row">
        <textarea class="msg-input" id="msg-input"
          placeholder="告訴我您的旅行計劃..."
          rows="1"
          onkeydown="onKey(event)"
          oninput="autoGrow(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>

  <!-- Itinerary Panel -->
  <div class="itinerary-panel" id="itin-panel">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🗺️</div>
      <h2>旅行行程將在這裡呈現</h2>
      <p>在左側與 AI 旅行顧問對話，告知您的旅行計劃，詳細行程表將自動生成於此。</p>
    </div>
    <div class="itin-content" id="itin-content" style="display:none"></div>
  </div>

</div>

<!-- ═══════════════ Settings Modal ═══════════════ -->
<div class="overlay" id="settings-modal">
  <div class="modal">
    <h2>⚙️ API 設定</h2>
    <div class="form-group">
      <label class="form-label">Anthropic API Key</label>

/* ═══════════════════════════════════════════════════════════
   API
═══════════════════════════════════════════════════════════ */
async function callAPI(messages) {
  if (!S.apiKey) throw new Error('請先設定 API Key');

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': S.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: S.model,
      max_tokens: 4096,
      system: SYS,
      messages,
    }),
  });

  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error?.message || `HTTP ${res.status}`);
  }
  return (await res.json()).content[0].text;
}

/* ═══════════════════════════════════════════════════════════
   Parse itinerary JSON from response
═══════════════════════════════════════════════════════════ */
function parseItinerary(text) {
  const m = text.match(/```itinerary\s*([\s\S]*?)```/);
  if (!m) return null;
  try { return JSON.parse(m[1].trim()); } catch { return null; }
}

function stripItinerary(text) {
  return text.replace(/```itinerary[\s\S]*?```/g, '').trim();
}

/* ═══════════════════════════════════════════════════════════
   UI helpers
═══════════════════════════════════════════════════════════ */
function now() {
  return new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
}

function esc(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function fmt(text) {
  return esc(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function appendMsg(role, text) {
  const isUser = role === 'user';
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.innerHTML = `
    <div class="msg-avatar ${isUser ? 'avatar-user' : 'avatar-agent'}">${isUser ? '👤' : '✈'}</div>
    <div class="msg-body">
      <div class="msg-bubble">${isUser ? esc(text) : fmt(text)}</div>
      <div class="msg-time">${now()}</div>
    </div>`;
  const container = document.getElementById('messages');
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function setTyping(v) {
  document.getElementById('typing').classList.toggle('show', v);
  const c = document.getElementById('messages');
  if (v) c.scrollTop = c.scrollHeight;
}

function setLoading(v) {
  S.loading = v;
  document.getElementById('send-btn').disabled = v;
  document.getElementById('msg-input').disabled = v;
  setTyping(v);
}

/* ═══════════════════════════════════════════════════════════
   Send message
═══════════════════════════════════════════════════════════ */
async function sendMsg() {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text || S.loading) return;

  if (!S.apiKey) { toast('⚠️ 請先點擊右上角「API 設定」輸入 API Key'); openSettings(); return; }

  inp.value = ''; autoGrow(inp);
  document.getElementById('chips').style.display = 'none';

  appendMsg('user', text);
  S.msgs.push({ role: 'user', content: text });
  setLoading(true);

  try {
    const reply = await callAPI(S.msgs);
    const itin  = parseItinerary(reply);
    const shown = stripItinerary(reply);

    S.msgs.push({ role: 'assistant', content: reply });
    appendMsg('agent', shown);

    if (itin) renderItinerary(itin);
  } catch (err) {
    appendMsg('agent', `抱歉，發生錯誤：${err.message}`);
  } finally {
    setLoading(false);
    inp.focus();
  }
}

function quickSend(t) {
  document.getElementById('msg-input').value = t;
  sendMsg();
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

}

let _toastTimer;
function toast(msg, loading = false) {
  document.querySelector('.toast')?.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `${loading ? '<div class="spinner"></div>' : ''}<span>${msg}</span>`;

}

/* ═══════════════════════════════════════════════════════════
   Export: PDF (via html2canvas)
═══════════════════════════════════════════════════════════ */
async function exportPDF() {
  if (!S.itinerary) return;
  const t = toast('⏳ 正在生成 PDF，請稍候...', true);

  try {
    buildExportView(S.itinerary);
    await new Promise(r => setTimeout(r, 400));

    const ev = document.getElementById('export-view');
    const canvas = await html2canvas(ev, { scale: 2, useCORS: true, logging: false, windowWidth: 820 });

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pW = pdf.internal.pageSize.getWidth();
    const pH = pdf.internal.pageSize.getHeight();
    const imgW = pW;
    const imgH = (canvas.height * pW) / canvas.width;
    const img  = canvas.toDataURL('image/jpeg', 0.95);

    let y = 0;
    pdf.addImage(img, 'JPEG', 0, y, imgW, imgH);
    let rem = imgH - pH;
    while (rem > 0) {
      y -= pH;
      pdf.addPage();
      pdf.addImage(img, 'JPEG', 0, y, imgW, imgH);
      rem -= pH;
    }

    pdf.save(`${S.itinerary.destination}_旅行行程.pdf`);
    t.remove();
    toast('✅ PDF 下載完成！');
  } catch (err) {
    t.remove();
    toast('❌ PDF 生成失敗：' + err.message);
  }
}

    body += `<h2 style="color:#6c5ce7">🏨 住宿推薦</h2>
    <table border="1" cellpadding="8" cellspacing="0" width="100%" style="border-collapse:collapse;margin-bottom:16px">
      <tr style="background:#6c5ce7;color:white">
        <th>酒店名稱</th><th>類型</th><th>位置</th><th>價格/晚</th><th>評分</th>
      </tr>`;
    itin.accommodation.forEach(h => {
      body += `<tr>
        <td><strong>${h.name}</strong>${h.highlights?'<br><small>'+h.highlights+'</small>':''}</td>
        <td>${h.type||''}</td><td>${h.location||''}</td>
        <td>${h.pricePerNight||''} × ${h.nights||''}晚</td>
        <td>${h.rating?'★'.repeat(Math.round(h.rating))+' '+h.rating:''}</td>
      </tr>`;
    });
    body += '</table>';
  }

  // Budget
  const b = itin.budget_breakdown;
  if (b) {
    body += `<h2 style="color:#6c5ce7">💰 預算明細</h2>
    <table border="1" cellpadding="8" cellspacing="0" width="60%" style="border-collapse:collapse;margin-bottom:16px">`;
    [['🏨 住宿',b.accommodation],['🍜 餐飲',b.food],['🚇 交通',b.transport],
     ['🎯 景點門票',b.activities],['🛍️ 購物',b.shopping]].filter(x=>x[1]).forEach(([l,v])=>{
      body += `<tr><td><strong>${l}</strong></td><td>${v}</td></tr>`;
    });
    if (b.total) body += `<tr style="background:#6c5ce7;color:white"><td><strong>合計（每人）</strong></td><td><strong>${b.total}</strong></td></tr>`;
    body += '</table>';
  }

  // Tips
  if ((itin.tips||[]).length) {
    body += `<h2 style="color:#6c5ce7">💡 旅行小貼士</h2><ul>`;
    itin.tips.forEach(t => { body += `<li>${t}</li>`; });
    body += `</ul>`;
  }

  body += `<hr/><p style="text-align:center;color:#aaa;font-size:12px">由旅行規劃助手生成 · ${new Date().toLocaleDateString('zh-TW')}</p>`;

  const full = `<html xmlns:o='urn:schemas-microsoft-com:office:office'
    xmlns:w='urn:schemas-microsoft-com:office:word'
    xmlns='http://www.w3.org/TR/REC-html40'>
  <head><meta charset="utf-8"/>
  <style>body{font-family:'Microsoft JhengHei',Arial,sans-serif;color:#222;line-height:1.7;padding:20px}</style>
  </head><body>${body}</body></html>`;

  const blob = new Blob(['\ufeff' + full], { type: 'application/msword;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${itin.destination}_旅行行程.doc`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('✅ Word 文件下載完成！');
}

/* ═══════════════════════════════════════════════════════════
   Build export-view HTML (white background, for PDF)
═══════════════════════════════════════════════════════════ */
function buildExportView(itin) {
  const ev = document.getElementById('export-view');
  const typeIcons = { attraction:'🎯', restaurant:'🍜', hotel:'🏨', transport:'🚇', shopping:'🛍️' };
  const typeColors = { attraction:'#6c5ce7', restaurant:'#fdcb6e', hotel:'#00cec9', transport:'#b2bec3', shopping:'#fd79a8' };

  let h = `<div style="font-family:'PingFang TC','Microsoft JhengHei',Arial,sans-serif;color:#1a1a2e">
    <div style="background:linear-gradient(135deg,#6c5ce7,#00cec9);color:#fff;border-radius:12px;padding:32px;text-align:center;margin-bottom:24px">
      <div style="font-size:28px;font-weight:700;margin-bottom:6px">✈️ ${itin.destination}</div>
      <div style="font-size:16px;opacity:.9">${itin.duration||''} 旅行行程表</div>
      ${itin.dates?`<div style="font-size:13px;opacity:.75;margin-top:4px">${itin.dates.start} → ${itin.dates.end}</div>`:''}
      ${itin.party?`<div style="font-size:13px;opacity:.75">${itin.party.size}人・${itin.party.type||''}</div>`:''}
    </div>`;

  (itin.days||[]).forEach(day => {
    h += `<div style="background:#fff;border-radius:10px;margin-bottom:16px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.08)">
      <div style="background:#6c5ce7;color:#fff;padding:12px 18px;display:flex;align-items:center;gap:12px">
        <div style="background:rgba(255,255,255,.25);width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">D${day.day}</div>
        <div>
          <div style="font-weight:600;font-size:14px">${day.theme||`第 ${day.day} 天`}</div>
          ${day.date?`<div style="font-size:12px;opacity:.8">${day.date}</div>`:''}
        </div>
      </div>
      <div style="padding:4px 0">
        <table style="width:100%;border-collapse:collapse">
          <tr style="background:#f8f7ff;font-size:11px;color:#666">
            <th style="padding:6px 10px;text-align:left;width:52px">時間</th>
            <th style="padding:6px 10px;text-align:left">行程安排</th>
            <th style="padding:6px 10px;text-align:left;width:100px">費用</th>
            <th style="padding:6px 10px;text-align:left;width:130px">交通</th>
          </tr>`;
    (day.activities||[]).forEach((a,i) => {
      const bg = i%2===0?'#fff':'#fafaf9';
      const col = typeColors[a.type]||'#6c5ce7';
      h += `<tr style="background:${bg};border-top:1px solid #f0eefc">
        <td style="padding:8px 10px;font-size:11px;color:#888;vertical-align:top">${a.time||''}</td>
        <td style="padding:8px 10px;vertical-align:top">
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:2px">
            <span style="font-size:13px">${typeIcons[a.type]||'📍'}</span>
            <strong style="font-size:13px;color:#1a1a2e">${a.name}</strong>
            ${a.duration?`<span style="font-size:10px;color:#aaa;background:#f5f5f5;padding:1px 6px;border-radius:8px">${a.duration}</span>`:''}
          </div>
          ${a.description?`<div style="font-size:11px;color:#777;line-height:1.4">${a.description}</div>`:''}
          ${a.tips?`<div style="font-size:10px;color:#e17055;margin-top:2px">💡 ${a.tips}</div>`:''}
        </td>
        <td style="padding:8px 10px;font-size:11px;color:#555;vertical-align:top">${a.cost||'-'}</td>
        <td style="padding:8px 10px;font-size:11px;color:#666;vertical-align:top">${a.transportFrom||'-'}</td>
      </tr>`;
    });
    h += '</table></div></div>';
  });

  // Hotels
  if ((itin.accommodation||[]).length) {
    h += `<div style="background:#fff;border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.08)">
      <h3 style="color:#6c5ce7;margin:0 0 14px">🏨 住宿推薦</h3>
      <table style="width:100%;border-collapse:collapse">
        <tr style="background:#f8f7ff;font-size:11px;color:#666">
          <th style="padding:6px 10px;text-align:left">酒店名稱</th>
          <th style="padding:6px 10px;text-align:left">位置</th>
          <th style="padding:6px 10px;text-align:left">價格/晚</th>
          <th style="padding:6px 10px;text-align:left">評分</th>
        </tr>`;
    itin.accommodation.forEach((ho,i) => {
      h += `<tr style="background:${i%2?'#fafaf9':'#fff'};border-top:1px solid #f0eefc">
        <td style="padding:8px 10px"><strong style="font-size:13px">${ho.name}</strong>
          <div style="font-size:11px;color:#888">${ho.type||''}${ho.highlights?'・'+ho.highlights:''}</div></td>
        <td style="padding:8px 10px;font-size:11px;color:#666">${ho.location||''}</td>
        <td style="padding:8px 10px;font-size:12px;color:#00cec9;font-weight:600">${ho.pricePerNight||''}<br><small style="color:#aaa">× ${ho.nights||''}晚</small></td>
        <td style="padding:8px 10px;font-size:12px;color:#fdcb6e">${ho.rating?'★'.repeat(Math.round(ho.rating))+' '+ho.rating:''}</td>
      </tr>`;
    });
    h += '</table></div>';
  }

  // Budget
  const b = itin.budget_breakdown;
  if (b) {
    const items = [['🏨','住宿',b.accommodation],['🍜','餐飲',b.food],['🚇','交通',b.transport],
                   ['🎯','景點門票',b.activities],['🛍️','購物',b.shopping]].filter(x=>x[2]);
    h += `<div style="background:#fff;border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.08)">
      <h3 style="color:#6c5ce7;margin:0 0 14px">💰 預算明細</h3>
      <div style="display:grid;grid-template-columns:repeat(${Math.min(items.length,3)},1fr);gap:10px;margin-bottom:14px">
        ${items.map(([icon,label,val])=>`
          <div style="background:#f8f7ff;border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:18px;margin-bottom:4px">${icon}</div>
            <div style="font-size:11px;color:#888;margin-bottom:3px">${label}</div>
            <div style="font-size:13px;font-weight:600;color:#6c5ce7">${val}</div>
          </div>`).join('')}
      </div>
      ${b.total?`<div style="background:linear-gradient(135deg,#6c5ce7,#00cec9);color:#fff;border-radius:8px;padding:14px;text-align:center">
        <div style="font-size:12px;opacity:.85">每人預計總費用</div>
        <div style="font-size:22px;font-weight:700">${b.total}</div>
      </div>`:''}
    </div>`;
  }

  // Tips
  if ((itin.tips||[]).length) {
    h += `<div style="background:#fff8f0;border:1px solid #fde8d1;border-radius:10px;padding:18px;margin-bottom:16px">
      <h3 style="color:#e17055;margin:0 0 12px">💡 旅行小貼士</h3>
      <ul style="margin:0;padding-left:18px">
        ${itin.tips.map(t=>`<li style="margin-bottom:7px;font-size:12px;color:#555">${t}</li>`).join('')}
      </ul>
    </div>`;
  }

  h += `<div style="text-align:center;color:#ccc;font-size:11px;padding-top:16px;border-top:1px solid #eee">
    由旅行規劃助手生成 · ${new Date().toLocaleDateString('zh-TW')}</div></div>`;

  ev.innerHTML = h;
}
